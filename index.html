<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    
    <!-- nav -->
    <nav>
        <h2>My Profile</h2>

        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Project</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- hero  -->
    <section id="home" class="hero">
    <h1>Hello, I'm Vishnu Yadav</h1>
    <p>Web Developer</p>
    </section>

    <!-- about -->
     <section id="about">
        <h2>About Me</h2>
        <p>I am a BCA student and passionate about web development.</p>
     </section>

    <!-- project -->
    <section id="projects">
        <h2>My Projects</h2>
        <div class="project">
            <h3>Portfolio Website</h3>
            <p>This is my personal portfolio project.</p>
        </div>
    </section>

    <!-- contact -->
     <section id="contact">
        <h2>Contact me</h2>
        <form action="">
            <label id="name">Name : </label>
            <input type="text" placeholder="Your Name"><br>

            <label id="about">Email : </label>
            <input type="email" placeholder="Your Email"><br>

            <label id="message">Message : </label>
            <textarea type="text" placeholder="Your Message"></textarea><br>

            <button>Send</button>
        </form>
     </section>

     <footer>
        <p>© 2026 Vishnu Yadav</p>
     </footer>
</body>
</html>
